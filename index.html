<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peta Persebaran PSBS</title>
    
    <link rel="stylesheet" href="css/leaflet.css">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; position: absolute; top: 0; z-index: 1; }
        
        /* Container untuk keterangan di bagian bawah */
        .info-container {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 25vh;
            background: white; z-index: 1000; border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3); overflow-y: auto;
            transition: height 0.3s ease; padding: 20px; box-sizing: border-box; text-align: center;
        }
        .info-container.expanded { height: 90vh; }
        .drag-handle { width: 60px; height: 6px; background: #888; border-radius: 5px; margin: 0 auto 20px auto; cursor: pointer; }
        
        /* Agar gambar legenda tidak kepanjangan */
        img { width: 100%; max-width: 600px; height: auto; display: block; margin: 0 auto; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="info-container" id="infoBox">
        <div class="drag-handle" onclick="toggleInfo()"></div>
        <h1>Keterangan Peta</h1>
        <img src="Peta Persebaran TPS3R & TPST.jpeg" alt="Legenda Peta">
        <p>Data TPS3R dan TPST di wilayah Denpasar.</p>
    </div>

    <script src="js/leaflet.js"></script>
    
    <script>
        // Inisialisasi Peta
        var map = L.map('map').setView([-8.695, 115.211], 12);

        // Menambahkan Tile Layer (Background Peta)
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Fungsi untuk membuka/menutup panel keterangan
        function toggleInfo() {
            document.getElementById('infoBox').classList.toggle('expanded');
        }
    </script>
</body>
</html>
