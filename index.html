<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
    <link rel="stylesheet" href="css/leaflet.css">
    <link rel="stylesheet" href="css/qgis2web.css">
    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100vh; position: absolute; top: 0; z-index: 1; }
        .info-container {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 30vh;
            background: white; z-index: 1000; border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.2); overflow-y: auto;
            transition: height 0.3s ease; padding: 20px; box-sizing: border-box; text-align: center;
        }
        .info-container.expanded { height: 90vh; }
        .drag-handle { width: 50px; height: 6px; background: #ccc; border-radius: 5px; margin: 0 auto 20px auto; cursor: pointer; }
        .info-container img { width: 100%; max-width: 800px; height: auto; display: block; margin: 0 auto; }
    </style>
    <title>Peta Persebaran PSBS</title>
</head>
<body>
    <div id="map"></div>

    <div class="info-container" id="infoBox">
        <div class="drag-handle" onclick="toggleInfo()"></div>
        <h1>Keterangan Peta</h1>
        <img src="Peta Persebaran TPS3R & TPST.jpeg" alt="Legenda Peta">
        <p>Data TPS3R dan TPST di wilayah Denpasar.</p>
    </div>

    <script src="js/leaflet.js"></script>
    <script src="js/Autolinker.min.js"></script>
    <script src="data/ADMINISTRASIKECAMATAN_AR_1.js"></script>
    <script src="data/DataPersebaranNew_2.js"></script>
    <script>
        // Inisialisasi Peta
        var map = L.map('map', { zoomControl: false, maxZoom: 28, minZoom: 1 }).fitBounds([[-8.778, 115.065], [-8.612, 115.357]]);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        // Fungsi Panel
        function toggleInfo() {
            document.getElementById('infoBox').classList.toggle('expanded');
        }
    </script>
</body>
</html>
