<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <style>
            html, body, #map { width: 100%; height: 100%; padding: 0; margin: 0; }
        </style>
    </head>
    <body>
        <div id="map"></div>

        <script src="js/leaflet.js"></script>
        <script src="data/ADMINISTRASIKECAMATAN_AR_1.js"></script>
        <script src="data/DataPersebaranNew_2.js"></script>

        <script>
            var map = L.map('map').fitBounds([[-8.77, 115.06], [-8.61, 115.35]]);
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

            // MEMANGGIL STYLE DARI QGIS
            // Kita menggunakan fungsi style_ADMINISTRASIKECAMATAN_AR_1_0 
            // yang sudah otomatis dibuatkan oleh QGIS di bagian bawah script kamu
            L.geoJson(json_ADMINISTRASIKECAMATAN_AR_1, {
                style: style_ADMINISTRASIKECAMATAN_AR_1_0, 
                onEachFeature: function(feature, layer) {
                    layer.bindTooltip(feature.properties.NAMOBJ, {permanent: true, className: 'label-class'});
                }
            }).addTo(map);

            L.geoJson(json_DataPersebaranNew_2, {
                pointToLayer: function(feature, latlng) {
                    return L.circleMarker(latlng, style_DataPersebaranNew_2_0(feature));
                }
            }).addTo(map);
        </script>
    </body>
</html>
